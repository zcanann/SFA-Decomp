name: Build

on:
  push:
  pull_request:

jobs:
  build:
    # This is a *private* build container.
    # See docs/github_actions.md for more information.
    container: ghcr.io/zcanann/sfa-decomp-private:main

    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        version: [GSAE01] #, GSAJ01, GSAP01] # Enable these eventually

    steps:
    # Checkout the repository
    - name: Checkout
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
        submodules: recursive

    # Set Git config
    - name: Git config
      run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

    # Normalize file mod times
    - name: Restore timestamps
      run: |
        uv run https://raw.githubusercontent.com/MestreLion/git-tools/refs/tags/v2022.12/git-restore-mtime \
            --merge --commit-time

    # Copy the original files to the workspace
    - name: Prepare
      run: cp -a /orig .

    # Restore cached files
    - name: Cache build
      uses: actions/cache@v4
      with:
        path: |
          build
          .ninja_deps
          .ninja_log
        key: ${{ runner.os }}-${{ matrix.version }}-${{ github.sha }}
        restore-keys: ${{ runner.os }}-${{ matrix.version }}-

    # Build the project
    - name: Build
      run: |
        # Drop cached build artifacts that a restored cache can leave stale
        # across a structural (splits.txt) change: the dtk-generated
        # config.json is untracked, so git-restore-mtime does not reset its
        # mtime and ninja can skip regenerating it from a newer splits.txt,
        # leaving stale unit paths that fail the report step. Removing it (and
        # any stale per-unit .o under renamed/relocated paths) forces a fresh
        # split from the current splits.txt.
        rm -f build/${{ matrix.version }}/config.json
        # A restored cache can also carry per-unit .o files for sources that
        # were since renamed (esp. case-only renames like DFpulley.c ->
        # dfpulley.c): the old-name .o lingers with a fresh cache mtime while
        # the report expects the new-name .o, and ninja may not rebuild it,
        # so the report step fails to open the new path. Drop every built
        # src .o whose source .c no longer exists, forcing a clean recompile
        # at the current name.
        python tools/ci_drop_orphan_objects.py build/${{ matrix.version }}/src
        python configure.py --map --version ${{ matrix.version }} \
            --binutils /binutils --compilers /compilers
        ninja all_source progress build/${{ matrix.version }}/report.json

    # Upload map files
    - name: Upload map
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.version }}_maps
        path: build/${{ matrix.version }}/**/*.MAP

    # Upload progress report
    - name: Upload report
      uses: actions/upload-artifact@v4
      with:
        name: ${{ matrix.version }}_report
        path: build/${{ matrix.version }}/report.json
